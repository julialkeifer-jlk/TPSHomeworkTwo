<!--https://www.w3schools.com/HOWTO/howto_js_password_validation.asp-->
<!--no special characters just letters and numbers, 1st cant be a number, underscore/dash ok, no spaces, all letters convert to uppercase-->
    User ID <input type = "text" id = "userid" name = "userid" minlength = "5" maxlength = "30" pattern = "[A-Za-z][A-Za-z0-9_-]{4,29}" title = "Enter UserID, must start with a letter, only letters, numbers, underscore, and dash allowed" onblur = "finalUserID()" required> <br>
    <!-- 1 upper case 1 lowercase 1 number and 1 special character at least DO NOT ALLOW QUOTES cant equal user ID or have name in it -->
    Password <input type = "password" id = "password" minlength = "8" maxlength = "30" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_\-+=\/<>.,`~])[A-Za-z\d!@#$%^&*()_\-+=\/<>.,`~]{8,30}" title = "Enter password. Must contain at least one uppercase letter, one lowercase letter, one number, and one special character" required> <br>
